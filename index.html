<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authentic Product</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(#e9e9e9, #dcdcdc);
    text-align: center;
  }

  .logo {
    margin-top: 30px;
    font-size: 50px;
    font-weight: bold;
    color: #555;
  }

  .subtitle {
    font-size: 12px;
    letter-spacing: 2px;
    margin-bottom: 20px;
  }

  .img-box img {
    width: 200px;
    border-radius: 10px;
  }

  .card {
    background: white;
    margin: 30px auto;
    padding: 25px;
    border-radius: 20px;
    width: 320px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }

  h2 {
    margin: 0;
    color: #333;
  }

  .count {
    font-size: 22px;
    margin: 15px 0;
  }

  button {
    padding: 12px 20px;
    background: black;
    color: white;
    border: none;
    border-radius: 12px;
  }
</style>
</head>

<body>

<div class="logo">dh</div>
<div class="subtitle">DANDY HATS X RUDE AWAKENINGS</div>

<div class="img-box">
  <img src="https://i.imgur.com/8Km9tLL.png">
</div>

<div class="card">
  <h2>Authentic Product</h2>
  <div class="count">Scan Count: <span id="counter">...</span></div>
  <button onclick="window.location.href='https://dandyhats.com'">
    About Dandy Hats
  </button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBiQXkKejJD7qI6GRzuw4Wr42uT0-ce4a8",
    authDomain: "gorra-nfc.firebaseapp.com",
    databaseURL: "https://gorra-nfc-default-rtdb.firebaseio.com",
    projectId: "gorra-nfc",
    storageBucket: "gorra-nfc.firebasestorage.app",
    messagingSenderId: "535761819487",
    appId: "1:535761819487:web:7b9654d1cbb5edb12248ea"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const counterRef = db.ref("contador");

  let lastScan = localStorage.getItem("lastScan") || 0;
  let now = Date.now();

  if (now - lastScan > 15000) {
    counterRef.transaction((current) => {
      return (current || 0) + 1;
    });
    localStorage.setItem("lastScan", now);
  }

  counterRef.on("value", (snapshot) => {
    document.getElementById("counter").innerText = snapshot.val() || 0;
  });
</script>

</body>
</html>
